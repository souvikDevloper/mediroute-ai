<svg width="1400" height="900" viewBox="0 0 1400 900" fill="none" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#090E18"/><stop offset="1" stop-color="#0D213A"/></linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="35" result="coloredBlur"/><feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <style>
    .title { font: 800 68px Arial, sans-serif; fill: #fff; }
