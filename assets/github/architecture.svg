<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="55%" stop-color="#07182a"/>
      <stop offset="100%" stop-color="#0b2740"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 48px; font-weight: 800; fill: #ffffff; }
      .subtitle { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 21px; fill: #dbeafe; }
      .box-title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 23px; font-weight: 800; fill: #ffffff; }
      .box-text { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 16px; fill: #dbeafe; }
      .panel-title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 31px; font-weight: 800; fill: #ffffff; }
      .bullet { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 17px; fill: #dbeafe; }
      .cyan { fill: #67e8f9; }
      .pink { fill: #ff5b78; }
      .arrow { stroke: #67e8f9; stroke-width: 4; stroke-linecap: round; }
    </style>
  </defs>

  <rect width="1600" height="980" fill="url(#bg)"/>
  <circle cx="1180" cy="60" r="230" fill="#7f1d46" opacity="0.35"/>
  <circle cx="1380" cy="785" r="360" fill="#06b6d4" opacity="0.16"/>

  <text x="80" y="70" class="title">Databricks-native architecture</text>
  <text x="80" y="113" class="subtitle">Bronze/Silver/Gold Lakehouse pipeline with MLflow trace and planner-ready RAG documents</text>

  <!-- Left pipeline -->
  <g filter="url(#shadow)">
    <rect x="130" y="170" width="560" height="74" rx="18" fill="#20385b" stroke="#5b78a8" stroke-width="2"/>
    <text x="158" y="202" class="box-title">Official VF Ghana CSV</text>
    <text x="158" y="226" class="box-text">Raw facility records, schema fields, messy notes</text>

    <line x1="410" y1="244" x2="410" y2="270" class="arrow"/>

    <rect x="130" y="270" width="560" height="74" rx="18" fill="#185178" stroke="#4e8fbb" stroke-width="2"/>
    <text x="158" y="302" class="box-title">Bronze Delta</text>
    <text x="158" y="326" class="box-text">bronze_facility_raw — raw table with cleaned column names</text>

    <line x1="410" y1="344" x2="410" y2="370" class="arrow"/>

    <rect x="130" y="370" width="560" height="74" rx="18" fill="#1b6678" stroke="#52a8b8" stroke-width="2"/>
    <text x="158" y="402" class="box-title">Silver Delta</text>
    <text x="158" y="426" class="box-text">silver_facility_clean — normalized fields and combined notes</text>

    <line x1="410" y1="444" x2="410" y2="470" class="arrow"/>

    <rect x="130" y="470" width="560" height="74" rx="18" fill="#3f3b8b" stroke="#7c73d2" stroke-width="2"/>
    <text x="158" y="502" class="box-title">IDP Extraction Agent</text>
    <text x="158" y="526" class="box-text">Extracts procedure, equipment, capability, specialties + row evidence</text>

    <line x1="410" y1="544" x2="410" y2="570" class="arrow"/>

    <rect x="130" y="570" width="560" height="74" rx="18" fill="#5a347d" stroke="#a05fd0" stroke-width="2"/>
    <text x="158" y="602" class="box-title">Claim Verification Agent</text>
    <text x="158" y="626" class="box-text">Flags verified, incomplete, and suspicious facility claims</text>

    <line x1="410" y1="644" x2="410" y2="670" class="arrow"/>

    <rect x="130" y="670" width="560" height="74" rx="18" fill="#87344f" stroke="#c95a78" stroke-width="2"/>
    <text x="158" y="702" class="box-title">Risk Scoring Engine</text>
    <text x="158" y="726" class="box-text">Scores facility and region/location-cluster medical desert risk</text>

    <line x1="410" y1="744" x2="410" y2="770" class="arrow"/>

    <rect x="130" y="770" width="560" height="74" rx="18" fill="#b23e4c" stroke="#ff6b7c" stroke-width="2"/>
    <text x="158" y="802" class="box-title">Gold Intelligence Tables</text>
    <text x="158" y="826" class="box-text">gold_facility_intelligence, gold_region_risk, gold_claim_verification</text>

    <line x1="410" y1="844" x2="410" y2="870" class="arrow"/>

    <rect x="130" y="870" width="560" height="74" rx="18" fill="#ff4864" stroke="#ff8093" stroke-width="2"/>
    <text x="158" y="902" class="box-title">Planner + Dashboard</text>
    <text x="158" y="926" class="box-text">Evidence-backed recommendations for non-technical planners</text>
  </g>

  <!-- Right panels -->
  <g filter="url(#shadow)">
    <rect x="800" y="175" width="630" height="205" rx="22" fill="#071121" stroke="#40587e" stroke-width="2"/>
    <text x="835" y="230" class="panel-title">Gold Delta outputs</text>
    <text x="850" y="270" class="bullet">• gold_idp_extracted_facts</text>
    <text x="850" y="300" class="bullet">• gold_claim_verification</text>
    <text x="850" y="330" class="bullet">• gold_facility_intelligence</text>
    <text x="850" y="360" class="bullet">• gold_region_risk</text>

    <rect x="800" y="425" width="630" height="220" rx="22" fill="#071121" stroke="#40587e" stroke-width="2"/>
    <text x="835" y="480" class="panel-title">Why this is not just RAG</text>
    <text x="835" y="525" class="subtitle cyan">✓ Structured IDP extraction before retrieval</text>
    <text x="835" y="558" class="subtitle cyan">✓ Deterministic evidence rules for claim checks</text>
    <text x="835" y="591" class="subtitle cyan">✓ Risk scoring before planner answers</text>
    <text x="835" y="624" class="subtitle cyan">✓ Row-level evidence and trace tables</text>

    <rect x="800" y="690" width="630" height="205" rx="22" fill="#071121" stroke="#ff4864" stroke-width="2"/>
    <text x="835" y="745" class="panel-title">Core loop</text>
    <text x="845" y="792" class="panel-title pink" font-size="28">Extract → Verify → Score</text>
    <text x="845" y="837" class="panel-title pink" font-size="28">→ Recommend → Plan</text>
  </g>
</svg>
