<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06111f"/>
      <stop offset="56%" stop-color="#07182a"/>
      <stop offset="100%" stop-color="#0b2740"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <style>
      .title { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 50px; font-weight: 800; fill: #ffffff; }
      .subtitle { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 22px; fill: #dbeafe; }
      .metric { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 48px; font-weight: 800; fill: #ffffff; }
      .label { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 19px; font-weight: 800; fill: #67e8f9; }
      .label-warn { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 19px; font-weight: 800; fill: #ff5b78; }
      .body { font-family: Inter, Segoe UI, Arial, sans-serif; font-size: 16px; fill: #dbeafe; }
      .foot { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; font-size: 20px; font-weight: 700; fill: #dbeafe; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>
  <circle cx="1130" cy="120" r="240" fill="#7f1d46" opacity="0.36"/>
  <circle cx="1340" cy="740" r="360" fill="#06b6d4" opacity="0.16"/>

  <text x="90" y="95" class="title">Databricks run results</text>
  <text x="90" y="140" class="subtitle">Official Virtue Foundation Ghana dataset processed through the Lakehouse pipeline</text>

  <!-- Cards row 1 -->
  <g filter="url(#shadow)">
    <rect x="90" y="210" width="300" height="150" rx="22" fill="#071121" stroke="#546f9f" stroke-width="2"/>
    <text x="120" y="265" class="metric">987</text>
    <text x="120" y="306" class="label">Facilities processed</text>
    <text x="120" y="336" class="body">Bronze → Silver → Gold</text>

    <rect x="430" y="210" width="300" height="150" rx="22" fill="#071121" stroke="#546f9f" stroke-width="2"/>
    <text x="460" y="265" class="metric">8,302</text>
    <text x="460" y="306" class="label">Evidence facts</text>
    <text x="460" y="336" class="body">Procedure / equipment / capability</text>

    <rect x="770" y="210" width="300" height="150" rx="22" fill="#071121" stroke="#546f9f" stroke-width="2"/>
    <text x="800" y="265" class="metric">1,117</text>
    <text x="800" y="306" class="label">Verification claims</text>
    <text x="800" y="336" class="body">Confidence + missing evidence checks</text>

    <rect x="1110" y="210" width="300" height="150" rx="22" fill="#071121" stroke="#ff4864" stroke-width="2"/>
    <text x="1140" y="265" class="metric">1,046</text>
    <text x="1140" y="306" class="label-warn">Weak claims</text>
    <text x="1140" y="336" class="body">Suspicious or incomplete claims</text>
  </g>

  <!-- Cards row 2 -->
  <g filter="url(#shadow)">
    <rect x="90" y="420" width="300" height="150" rx="22" fill="#071121" stroke="#546f9f" stroke-width="2"/>
    <text x="120" y="475" class="metric">71</text>
    <text x="120" y="516" class="label">Verified claims</text>
    <text x="120" y="546" class="body">Strongly supported by evidence</text>

    <rect x="430" y="420" width="300" height="150" rx="22" fill="#071121" stroke="#ff4864" stroke-width="2"/>
    <text x="460" y="475" class="metric">626</text>
    <text x="460" y="516" class="label-warn">Critical/high facilities</text>
    <text x="460" y="546" class="body">Prioritized intervention targets</text>

    <rect x="770" y="420" width="300" height="150" rx="22" fill="#071121" stroke="#546f9f" stroke-width="2"/>
    <text x="800" y="475" class="metric">54</text>
    <text x="800" y="516" class="label">Location clusters</text>
    <text x="800" y="546" class="body">Source-derived region groups</text>

    <rect x="1110" y="420" width="300" height="150" rx="22" fill="#071121" stroke="#546f9f" stroke-width="2"/>
    <text x="1140" y="475" class="metric">987</text>
    <text x="1140" y="516" class="label">RAG documents</text>
    <text x="1140" y="546" class="body">One document per facility</text>
  </g>

  <text x="90" y="790" class="foot">Evidence-backed outputs: gold_region_risk • gold_claim_verification • gold_rag_documents • gold_agent_trace_summary</text>
</svg>
